<svg width="490" height="380" viewBox="0 0 490 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5f5f5" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.2)" />
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.05)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0)" />
    </linearGradient>
  </defs>

  <rect width="490" height="380" rx="32" fill="url(#bg)" />
  <rect width="490" height="380" rx="32" fill="none" stroke="url(#edge)" stroke-width="1" />

  <g font-family="Geist, system-ui, -apple-system, sans-serif">
    <text x="40" y="60" font-size="12" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="4.8" text-anchor="start">ACTIVITY SNAPSHOT</text>
    <path d="M 40 80 L 450 80" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

    <!-- Big Stat 1 -->
    <text x="40" y="130" font-size="11" font-weight="600" fill="#8e92a9" letter-spacing="1.5">CONTRIBUTIONS</text>
    <text x="40" y="170" font-size="42" font-weight="600" fill="#f5f5f5">840<tspan fill="#8e92a9">+</tspan></text>
    
    <!-- Big Stat 2 -->
    <text x="240" y="130" font-size="11" font-weight="600" fill="#8e92a9" letter-spacing="1.5">PROJECTS</text>
    <text x="240" y="170" font-size="42" font-weight="600" fill="#f5f5f5">15<tspan fill="#8e92a9">+</tspan></text>

    <!-- Top Languages Bars -->
    <text x="40" y="210" font-size="11" font-weight="600" fill="#8e92a9" letter-spacing="1.5">TOP LANGUAGES</text>
    
    <!-- Lang 1 -->
    <text x="40" y="240" font-size="13" font-weight="500" fill="#f5f5f5">TypeScript</text>
    <rect x="130" y="232" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="232" width="200" height="8" rx="4" fill="#f5f5f5" />

    <!-- Lang 2 -->
    <text x="40" y="265" font-size="13" font-weight="500" fill="#f5f5f5">Python</text>
    <rect x="130" y="257" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="257" width="120" height="8" rx="4" fill="rgba(255,255,255,0.7)" />

    <!-- Lang 3 -->
    <text x="40" y="290" font-size="13" font-weight="500" fill="#f5f5f5">JavaScript</text>
    <rect x="130" y="282" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="282" width="80" height="8" rx="4" fill="rgba(255,255,255,0.4)" />

    <!-- Subtle Graph Graphic -->
    <path d="M 40 350 Q 150 280 250 330 T 450 280" fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" />
    <path d="M 40 350 Q 150 280 250 330 T 450 280 L 450 380 L 40 380 Z" fill="url(#fillGrad)" opacity="0.5"/>
  </g>
</svg>
