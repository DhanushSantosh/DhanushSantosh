<svg width="490" height="380" viewBox="0 0 490 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.1)" />
      <stop offset="100%" stop-color="rgba(167, 139, 250, 0)" />
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.2)" />
      <stop offset="100%" stop-color="rgba(167, 139, 250, 0)" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="490" height="380" rx="24" fill="url(#bg)" />
  <rect width="490" height="380" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
  
  <circle cx="390" cy="100" r="150" fill="url(#glow)" filter="url(#blur)" />

  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="40" y="60" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">Activity Snapshot</text>
    <path d="M 40 80 L 450 80" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

    <!-- Big Stat 1 -->
    <text x="40" y="130" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="1">CONTRIBUTIONS</text>
    <text x="40" y="170" font-size="42" font-weight="800" fill="#ffffff">840+</text>
    
    <!-- Big Stat 2 -->
    <text x="240" y="130" font-size="12" font-weight="600" fill="#2dd4bf" letter-spacing="1">PROJECTS</text>
    <text x="240" y="170" font-size="42" font-weight="800" fill="#ffffff">15+</text>

    <!-- Top Languages Bars -->
    <text x="40" y="210" font-size="12" font-weight="600" fill="#888888" letter-spacing="1">TOP LANGUAGES</text>
    
    <!-- Lang 1 -->
    <text x="40" y="240" font-size="13" font-weight="500" fill="#d4d4d4">TypeScript</text>
    <rect x="130" y="232" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="232" width="200" height="8" rx="4" fill="#3178c6" />

    <!-- Lang 2 -->
    <text x="40" y="265" font-size="13" font-weight="500" fill="#d4d4d4">Python</text>
    <rect x="130" y="257" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="257" width="120" height="8" rx="4" fill="#3572A5" />

    <!-- Lang 3 -->
    <text x="40" y="290" font-size="13" font-weight="500" fill="#d4d4d4">JavaScript</text>
    <rect x="130" y="282" width="280" height="8" rx="4" fill="rgba(255,255,255,0.05)" />
    <rect x="130" y="282" width="80" height="8" rx="4" fill="#f1e05a" />

    <!-- Subtle Graph Graphic -->
    <path d="M 40 350 Q 150 280 250 330 T 450 280" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" />
    <path d="M 40 350 Q 150 280 250 330 T 450 280 L 450 380 L 40 380 Z" fill="url(#fillGrad)" opacity="0.5"/>
  </g>
</svg>
