<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Glass Base -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Edge Highlight -->
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>

    <!-- Super Subtle Cyan Accent Glow -->
    <radialGradient id="glow" cx="10%" cy="10%" r="50%">
      <stop offset="0%" stop-color="rgba(95, 225, 255, 0.05)" />
      <stop offset="100%" stop-color="rgba(95, 225, 255, 0)" />
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1000" height="300" rx="32" fill="url(#bg)" />
  <rect width="1000" height="300" rx="32" fill="url(#glow)" />
  <rect width="1000" height="300" rx="32" fill="none" stroke="url(#edge)" stroke-width="1" />

  <!-- Content -->
  <g font-family="Geist, system-ui, -apple-system, sans-serif">
    <!-- Tag (Eyebrow Label from Style Guide: text-xs uppercase tracking-[0.4em] text-white/50) -->
    <text x="60" y="70" font-size="12" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="4.8" text-anchor="start">AVAILABLE FOR WORK</text>

    <!-- Main Header -->
    <text x="60" y="145" font-size="56" font-weight="600" fill="#f5f5f5" letter-spacing="-1">Dhanush Santosh</text>
    
    <!-- Subtitle (text-balance) -->
    <text x="60" y="195" font-size="20" font-weight="400" fill="#f5f5f5">Full-Stack AI Developer &amp; Cinematic UI Engineer</text>
    
    <!-- Body Copy (text-base, text-white/70) -->
    <text x="60" y="240" font-size="16" font-weight="400" fill="#8e92a9">Crafting AI-native products where resilient infra, delightful UX, </text>
    <text x="60" y="265" font-size="16" font-weight="400" fill="#8e92a9">and reliable models operate as a single surface.</text>
  </g>
</svg>
