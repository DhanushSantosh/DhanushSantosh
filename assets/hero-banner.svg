<svg width="100%" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Glow Gradients -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(45, 212, 191, 0.15)" /> <!-- Teal/Cyan -->
      <stop offset="100%" stop-color="rgba(45, 212, 191, 0)" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(167, 139, 250, 0.15)" /> <!-- Purple -->
      <stop offset="100%" stop-color="rgba(167, 139, 250, 0)" />
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0.1)" /> <!-- Light Blue -->
      <stop offset="100%" stop-color="rgba(56, 189, 248, 0)" />
    </radialGradient>

    <!-- Blur Filter -->
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="50" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Ambient Glows -->
  <g filter="url(#blur)">
    <circle cx="200" cy="50" r="150" fill="url(#glow1)" />
    <circle cx="800" cy="250" r="180" fill="url(#glow2)" />
    <circle cx="500" cy="150" r="200" fill="url(#glow3)" />
  </g>

  <!-- Grid overlay for texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Typography -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Main Title -->
    <text x="500" y="160" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="8">DHANUSH SANTOSH</text>
    
    <!-- Subtitle -->
    <text x="500" y="205" font-size="14" font-weight="500" fill="#888888" letter-spacing="6">FULL-STACK AI DEVELOPER</text>
  </g>
</svg>
