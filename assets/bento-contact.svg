<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)" />
    </linearGradient>
    <!-- Soft Cyan Hover Hint -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(95, 225, 255, 0.05)" />
      <stop offset="100%" stop-color="rgba(95, 225, 255, 0)" />
    </radialGradient>
  </defs>

  <rect width="1000" height="120" rx="32" fill="url(#bg)" />
  <rect width="1000" height="120" rx="32" fill="url(#glow)" />
  <rect width="1000" height="120" rx="32" fill="none" stroke="url(#edge)" stroke-width="1" />
  
  <g font-family="Geist, system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="500" y="55" font-size="20" font-weight="600" fill="#f5f5f5" letter-spacing="-0.5">Let's ship something intelligent together.</text>
    
    <!-- Primary Button Style -->
    <rect x="360" y="70" width="280" height="32" rx="16" fill="#f5f5f5" />
    <text x="500" y="91" font-size="13" font-weight="600" fill="#000000" letter-spacing="0.5">contact@xerocore.in • xerocore.in</text>
  </g>
</svg>
