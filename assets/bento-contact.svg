<svg width="1000" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(56, 189, 248, 0.1)" />
      <stop offset="100%" stop-color="rgba(56, 189, 248, 0)" />
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <rect width="1000" height="120" rx="24" fill="url(#bg)" />
  <rect width="1000" height="120" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
  
  <circle cx="500" cy="60" r="100" fill="url(#glow)" filter="url(#blur)" />

  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="500" y="55" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="0.5">Let's ship something intelligent together.</text>
    
    <rect x="360" y="70" width="280" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="500" y="89" font-size="13" font-weight="500" fill="#2dd4bf" letter-spacing="0.5">contact@xerocore.in • xerocore.in</text>
  </g>
</svg>
