    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="490" height="380" rx="24" fill="url(#bg)" />
  <rect width="490" height="380" rx="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />

  <!-- Glow -->
  <circle cx="100" cy="100" r="150" fill="url(#glow)" filter="url(#blur)" />

